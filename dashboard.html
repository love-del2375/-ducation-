<meta name='viewport' content='width=device-width, initial-scale=1'/>{% extends "base.html" %}
{% block content %}
<h1>Suivi des Notes Étudiantes</h1>

<form method="POST" class="mb-4">
    <select name="student_id" required>
        {% for student in students %}
        <option value="{{ student.id }}">{{ student.name }}</option>
        {% endfor %}
    </select>
    <input type="text" name="subject" placeholder="Matière" required>
    <input type="number" step="0.1" name="note" placeholder="Note" required>
    <button type="submit" class="btn btn-primary">Ajouter</button>
</form>

<h2>Graphiques</h2>
<div>{{ graph1|safe }}</div>
<div>{{ graph2|safe }}</div>

<h2>Tableau des notes</h2>
<table class="table table-striped">
    <tr><th>Nom</th><th>Matière</th><th>Note</th></tr>
    {% for note in notes %}
    <tr><td>{{ note.student.name }}</td><td>{{ note.subject }}</td><td>{{ note.note }}</td></tr>
    {% endfor %}
</table>
{% endblock %}
