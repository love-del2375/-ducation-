<meta name='viewport' content='width=device-width, initial-scale=1'/>{% extends "base.html" %}
{% block content %}
<h2>Gestion des utilisateurs</h2>
<table class="table table-striped">
    <tr><th>Nom</th><th>Email</th><th>Rôle</th></tr>
    {% for user in users %}
    <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
